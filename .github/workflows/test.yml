name: Test

on:
  push:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm i
      - name: Typecheck
        run: pnpm typecheck
      - name: Build
        run: pnpm build
      - name: Typecheck (websxa-opencode)
        run: pnpm --filter websxa-opencode typecheck
      - name: Build (websxa-opencode)
        run: pnpm --filter websxa-opencode build
      - name: Test
        run: pnpm test:run
