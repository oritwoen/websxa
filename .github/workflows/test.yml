name: Test

on:
  push:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm i
      - name: Typecheck
        run: pnpm typecheck
      - name: Build
        run: pnpm build
      - name: Typecheck (opencode-websxa)
        run: pnpm --filter opencode-websxa typecheck
      - name: Build (opencode-websxa)
        run: pnpm --filter opencode-websxa build
      - name: Test
        run: pnpm test:run
