name: Release (opencode-websxa)

permissions:
  contents: write
  id-token: write

on:
  push:
    tags:
      - 'opencode-v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm i
      - run: pnpm build
      - run: pnpm --filter opencode-websxa build
      - run: pnpm --filter opencode-websxa publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
