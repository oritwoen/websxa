name: Release (websxa-opencode)

permissions:
  id-token: write

on:
  push:
    tags:
      - 'opencode-v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm i
      - run: pnpm build
      - run: pnpm --filter websxa-opencode build
      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/opencode-v}"
          PKG_VERSION=$(node -p "require('./packages/websxa-opencode/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) doesn't match package.json ($PKG_VERSION)"
            exit 1
          fi
      - run: pnpm --filter websxa-opencode publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
